<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SkyGuider AR</title>
  <!-- Tailwind CSS for premium UI styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #020014;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #camera-preview {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }
    #ar-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: auto;
    }
    .hud {
      z-index: 3;
    }
    /* Hide scrollbars */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="relative flex flex-col justify-between h-full select-none text-slate-100">

  <!-- 1. Real Camera Feed (Background AR) -->
  <video id="camera-preview" autoplay playsinline muted class="opacity-70 transition-opacity duration-1000"></video>

  <!-- 2. Interactive Star Layer (Canvas) -->
  <canvas id="ar-canvas"></canvas>

  <!-- 3. Top Status HUD Bar -->
  <div class="hud absolute top-4 left-4 right-4 bg-slate-950/80 border border-slate-800/80 p-4 rounded-2xl backdrop-blur-md shadow-2xl pointer-events-none">
    <div class="flex justify-between items-start pointer-events-auto">
      <div>
        <h1 class="text-white font-extrabold tracking-wider text-lg flex items-center gap-2">
          SkyGuider AR <span class="w-2 h-2 rounded-full bg-green-500 animate-ping"></span>
        </h1>
        <p id="sensor-readout" class="text-amber-500 font-mono text-xs mt-1 tracking-wider">Loading system compass...</p>
      </div>
      <div class="flex flex-col gap-2 items-end">
        <!-- Calibration Trigger for iOS Safari -->
        <button id="permission-btn" class="hidden text-xs bg-amber-500 hover:bg-amber-400 text-slate-950 font-bold px-3 py-1.5 rounded-lg transition shadow-md">
          Calibrate Sensors
        </button>
        <!-- Custom Personalization: Smart Watch Sync Toggle -->
        <button id="watch-sync-btn" class="text-xs bg-blue-500/20 hover:bg-blue-500/40 text-blue-300 border border-blue-500/30 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition font-semibold">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
          </svg>
          Watch Remote Off
        </button>
      </div>
    </div>
  </div>

  <!-- 4. Flash Trigger / Watch Notification Popup -->
  <div id="watch-toast" class="hud absolute top-28 left-4 right-4 bg-blue-950/90 border border-blue-700/50 p-3 rounded-xl backdrop-blur-md flex items-center gap-3 transform -translate-y-20 opacity-0 transition-all duration-500 pointer-events-none">
    <span class="text-xl">⌚</span>
    <div class="flex-1">
      <p class="text-xs font-bold text-blue-400 uppercase tracking-widest">Watch Controller Event</p>
      <p id="watch-toast-msg" class="text-xs text-white">Shutter triggered from Wearable device!</p>
    </div>
  </div>

  <!-- 5. Bottom Interactive Selector HUD -->
  <div class="hud absolute bottom-6 left-4 right-4 flex flex-col gap-4 pointer-events-none">
    
    <!-- Target Info Card -->
    <div class="bg-slate-950/95 border border-slate-800/80 rounded-2xl p-4 backdrop-blur-md shadow-2xl flex flex-col gap-3 pointer-events-auto">
      <div class="flex justify-between items-center">
        <span class="text-[10px] font-bold text-slate-500 tracking-widest uppercase">Target Details</span>
        <span id="lock-badge" class="text-[10px] font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-0.5 rounded-full uppercase tracking-widest">
          Searching
        </span>
      </div>
      
      <!-- Target Selector Button Container -->
      <button id="target-selector" class="w-full bg-slate-900/60 border border-slate-800 hover:border-slate-700 active:scale-[0.98] transition p-4 rounded-xl flex items-center justify-between">
        <div class="text-left">
          <p id="active-target-text" class="text-white text-xl font-black tracking-wide">The Moon</p>
          <p id="target-data-text" class="text-slate-400 font-mono text-[11px] mt-0.5">RA: 14.5h | Dec: -15.0°</p>
        </div>
        <div class="bg-amber-500/10 text-amber-400 px-3 py-1.5 rounded-lg border border-amber-500/20 text-xs font-bold flex items-center gap-1">
          Cycle Target 
          <span class="text-sm">➔</span>
        </div>
      </button>

      <!-- Camera Control Trigger -->
      <div class="flex gap-2">
        <button id="snap-shutter-btn" class="flex-1 bg-slate-900 border border-slate-800 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-800 transition flex items-center justify-center gap-2">
          <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Take Star Snapshot
        </button>
      </div>
    </div>
  </div>

  <script>
    // --- 1. ASTRONOMICAL CELESTIAL CATALOG ---
    const CATALOG = [
      { id: 'moon', name: 'The Moon', ra: 14.5, dec: -15.0, mag: -12.0, color: '#ffffff' },
      { id: 'polaris', name: 'Polaris', ra: 2.53, dec: 89.26, mag: 2.0, color: '#ffffcc' },
      { id: 'sirius', name: 'Sirius', ra: 6.75, dec: -16.71, mag: -1.46, color: '#a3c2ff' },
      { id: 'betelgeuse', name: 'Betelgeuse', ra: 5.91, dec: 7.4, mag: 0.5, color: '#ffb380' },
      { id: 'rigel', name: 'Rigel', ra: 5.24, dec: -8.2, mag: 0.12, color: '#80d4ff' },
      { id: 'm42', name: 'Orion Nebula (M42)', ra: 5.58, dec: -5.39, mag: 4.0, color: '#ff99ff' },
      { id: 'm31', name: 'Andromeda (M31)', ra: 0.71, dec: 41.26, mag: 3.4, color: '#ccccff' }
    ];

    const CONSTELLATIONS = [
      { id: 'orion_belt', lines: [
        { ra1: 5.91, dec1: 7.4, ra2: 5.24, dec2: -8.2 }, // Betelgeuse to Rigel
        { ra1: 5.58, dec1: -5.39, ra2: 5.24, dec2: -8.2 } // Orion Nebula to Rigel
      ], color: 'rgba(245, 158, 11, 0.25)' }
    ];

    // Default Location: Eastvale, CA
    const locationCoords = { lat: 33.9636, lon: -117.5640 }; 
    let activeIndex = 0;
    let deviceOrientation = { azimuth: 180, altitude: 0 };
    let isWatchConnected = false;

    const canvas = document.getElementById('ar-canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('camera-preview');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- 2. ASTROPHYSICAL MATH ENGINE ---
    const MathEngine = {
      rad: (deg) => deg * (Math.PI / 180),
      deg: (rad) => rad * (180 / Math.PI),
      getLST: (lon) => {
        const date = new Date();
        const jd = (date.getTime() / 86400000) + 2440587.5;
        const d = jd - 2451545.0;
        const gmst = 280.46061837 + 360.98564736629 * d;
        return ((gmst + lon) % 360 + 360) % 360;
      },
      getAltAz: (raHours, decDeg, latDeg, lonDeg) => {
        const raDeg = raHours * 15;
        const haDeg = (MathEngine.getLST(lonDeg) - raDeg + 360) % 360;
        const lat = MathEngine.rad(latDeg);
        const dec = MathEngine.rad(decDeg);
        const ha = MathEngine.rad(haDeg);
        const sinAlt = Math.sin(dec) * Math.sin(lat) + Math.cos(dec) * Math.cos(lat) * Math.cos(ha);
        const altRad = Math.asin(sinAlt);
        const cosAz = (Math.sin(dec) - Math.sin(altRad) * Math.sin(lat)) / (Math.cos(altRad) * Math.cos(lat));
        let azRad = Math.acos(Math.max(-1, Math.min(1, cosAz)));
        let azDeg = MathEngine.deg(azRad);
        if (Math.sin(ha) > 0) azDeg = 360 - azDeg;
        return { altitude: MathEngine.deg(altRad), azimuth: azDeg };
      }
    };

    // --- 3. CAMERA ACCESS ---
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: "environment" } },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        try {
          const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
          video.srcObject = fallbackStream;
        } catch (fallbackErr) {
          console.warn("Camera blocked: ", fallbackErr);
        }
      }
    }

    // --- 4. SENSOR PERMISSIONS ---
    function setupOrientation() {
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        const permBtn = document.getElementById('permission-btn');
        permBtn.classList.remove('hidden');
        permBtn.onclick = async () => {
          try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === 'granted') {
              window.addEventListener('deviceorientation', handleOrientation, true);
              permBtn.classList.add('hidden');
            }
          } catch (e) {
            console.error(e);
          }
        };
      } else {
        window.addEventListener('deviceorientation', handleOrientation, true);
      }
    }

    function handleOrientation(e) {
      const heading = e.webkitCompassHeading !== undefined ? e.webkitCompassHeading : (360 - e.alpha);
      deviceOrientation.azimuth = heading;
      deviceOrientation.altitude = Math.max(-90, Math.min(90, 90 - e.beta));
    }

    // --- 5. RENDER ENGINE ---
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const fov = 60;
      const pxPerDeg = canvas.width / fov;

      const activeTarget = CATALOG[activeIndex];
      let targetCoords = null;

      document.getElementById('sensor-readout').innerText = 
        `AZ: ${deviceOrientation.azimuth.toFixed(1)}° | ALT: ${deviceOrientation.altitude.toFixed(1)}°`;

      const projectToScreen = (azimuth, altitude) => {
        let dAz = azimuth - deviceOrientation.azimuth;
        if (dAz > 180) dAz -= 360;
        if (dAz < -180) dAz += 360;
        const dAlt = altitude - deviceOrientation.altitude;

        const x = cx + (dAz * pxPerDeg);
        const y = cy - (dAlt * pxPerDeg);
        const onScreen = (x > -100 && x < canvas.width + 100 && y > -100 && y < canvas.height + 100);
        return { x, y, onScreen };
      };

      // Draw Constellations
      CONSTELLATIONS.forEach(constellation => {
        ctx.beginPath();
        constellation.lines.forEach((line, lineIdx) => {
          const pt1AltAz = MathEngine.getAltAz(line.ra1, line.dec1, locationCoords.lat, locationCoords.lon);
          const pt2AltAz = MathEngine.getAltAz(line.ra2, line.dec2, locationCoords.lat, locationCoords.lon);
          
          const pt1 = projectToScreen(pt1AltAz.azimuth, pt1AltAz.altitude);
          const pt2 = projectToScreen(pt2AltAz.azimuth, pt2AltAz.altitude);

          if (pt1.onScreen || pt2.onScreen) {
            if (lineIdx === 0) ctx.moveTo(pt1.x, pt1.y);
            ctx.lineTo(pt2.x, pt2.y);
          }
        });
        ctx.strokeStyle = constellation.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });

      // Draw Stars
      CATALOG.forEach((obj, idx) => {
        const { altitude, azimuth } = MathEngine.getAltAz(obj.ra, obj.dec, locationCoords.lat, locationCoords.lon);
        const pt = projectToScreen(azimuth, altitude);

        const isCurrent = idx === activeIndex;
        const size = Math.max(3, 8 - obj.mag);

        if (pt.onScreen) {
          if (isCurrent) targetCoords = pt;

          ctx.beginPath();
          ctx.arc(pt.x, pt.y, size * 2.5, 0, Math.PI * 2);
          const starGrad = ctx.createRadialGradient(pt.x, pt.y, size * 0.2, pt.x, pt.y, size * 2.5);
          starGrad.addColorStop(0, obj.color);
          starGrad.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = starGrad;
          ctx.fill();

          ctx.beginPath();
          ctx.arc(pt.x, pt.y, size * 0.8, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();

          if (isCurrent || obj.mag < 1.0) {
            ctx.fillStyle = isCurrent ? '#22c55e' : '#94a3b8';
            ctx.font = isCurrent ? 'bold 13px sans-serif' : '10px sans-serif';
            ctx.fillText(obj.name, pt.x + size + 8, pt.y + 4);
          }

          if (isCurrent) {
            ctx.beginPath();
            ctx.arc(pt.x, pt.y, size + 16, 0, Math.PI * 2);
            ctx.strokeStyle = '#22c55e';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      });

      // Guide Navigation Arrow
      const lockBadge = document.getElementById('lock-badge');
      if (targetCoords) {
        lockBadge.innerText = 'Locked';
        lockBadge.className = "text-[10px] font-bold bg-green-500/20 text-green-400 border border-green-500/30 px-2 py-0.5 rounded-full uppercase tracking-widest";
      } else {
        lockBadge.innerText = 'Searching';
        lockBadge.className = "text-[10px] font-bold bg-amber-500/20 text-amber-400 border border-amber-500/30 px-2 py-0.5 rounded-full uppercase tracking-widest";

        const { altitude, azimuth } = MathEngine.getAltAz(activeTarget.ra, activeTarget.dec, locationCoords.lat, locationCoords.lon);
        const pt = projectToScreen(azimuth, altitude);
        
        const angle = Math.atan2(pt.y - cy, pt.x - cx);
        const pad = Math.min(cx, cy) - 55;
        const arrowX = cx + Math.cos(angle) * pad;
        const arrowY = cy + Math.sin(angle) * pad;

        ctx.save();
        ctx.translate(arrowX, arrowY);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(12, 0);
        ctx.lineTo(-10, -9);
        ctx.lineTo(-4, 0);
        ctx.lineTo(-10, 9);
        ctx.closePath();
        ctx.fillStyle = '#f59e0b';
        ctx.shadowColor = '#f59e0b';
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.restore();
      }

      requestAnimationFrame(animate);
    }

    // --- 6. WEARABLE & UI INTERACTIONS ---
    function triggerCameraSnapshot(source = 'Phone interface') {
      const flash = document.createElement('div');
      flash.className = 'absolute inset-0 bg-white z-50 transition-opacity duration-300 pointer-events-none opacity-100';
      document.body.appendChild(flash);
      setTimeout(() => { flash.style.opacity = '0'; }, 50);
      setTimeout(() => { flash.remove(); }, 400);

      if (navigator.vibrate) navigator.vibrate(80);
      showToast(`Snapshot captured securely! (${source})`);
    }

    function showToast(msg, isWatch = false) {
      const toast = document.getElementById('watch-toast');
      const toastMsg = document.getElementById('watch-toast-msg');
      toastMsg.innerText = msg;
      
      toast.classList.remove('-translate-y-20', 'opacity-0');
      toast.classList.add('translate-y-0', 'opacity-100');
      
      setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-20', 'opacity-0');
      }, 3000);
    }

    document.getElementById('target-selector').addEventListener('click', () => {
      activeIndex = (activeIndex + 1) % CATALOG.length;
      const target = CATALOG[activeIndex];
      document.getElementById('active-target-text').innerText = target.name;
      document.getElementById('target-data-text').innerText = `RA: ${target.ra}h | Dec: ${target.dec}°`;
    });

    document.getElementById('snap-shutter-btn').addEventListener('click', () => {
      triggerCameraSnapshot('Phone button');
    });

    // Mock Watch Sync
    const watchBtn = document.getElementById('watch-sync-btn');
    watchBtn.addEventListener('click', () => {
      isWatchConnected = !isWatchConnected;
      if (isWatchConnected) {
        watchBtn.className = "text-xs bg-green-500/20 hover:bg-green-500/40 text-green-300 border border-green-500/30 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition font-semibold pointer-events-auto";
        watchBtn.innerHTML = `<span class="w-2 h-2 rounded-full bg-green-500"></span> Watch Sync Active`;
        showToast("Connected to Smart Watch companion remote!", true);
        
        setTimeout(() => {
          if (isWatchConnected) triggerCameraSnapshot('Smart Watch Remote Click');
        }, 4000);
      } else {
        watchBtn.className = "text-xs bg-blue-500/20 hover:bg-blue-500/40 text-blue-300 border border-blue-500/30 px-3 py-1.5 rounded-lg flex items-center gap-1.5 transition font-semibold pointer-events-auto";
        watchBtn.innerHTML = `<svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg> Watch Remote Off`;
        showToast("Watch remote disconnected.");
      }
    });

    window.onload = function() {
      startCamera();
      setupOrientation();
      animate(); 
    }
  </script>
</body>
</html>
